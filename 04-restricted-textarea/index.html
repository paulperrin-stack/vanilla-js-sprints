<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Restricted Textarea</title>
  <style>

    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; }

    .textarea-wrapper {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .textarea-wrapper label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #888;
    }

    .textarea-wrapper textarea {
      font: inherit;
      font-size: 1rem;
      padding: 0.65rem 0.75rem;
      border: 2px solid #eee;
      border-radius: 4px;
      resize: vertical;
      outline: none;
      line-height: 1.6;
      transition: border-color 0.15s;
      color: #111;
    }
    .textarea-wrapper textarea:focus  { border-color: #2563eb; }
    .textarea-wrapper textarea.warn   { border-color: #f59e0b; }
    .textarea-wrapper textarea.limit  { border-color: #ef4444; }

    .counter-row {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 0.4rem;
    }

    .counter {
      font-size: 0.8rem;
      color: #aaa;
      transition: color 0.15s;
      font-variant-numeric: tabular-nums;
    }
    .counter.warn  { color: #f59e0b; }
    .counter.limit { color: #ef4444; font-weight: 600; }

    .counter-bar-track {
      flex: 1;
      height: 3px;
      background: #eee;
      border-radius: 999px;
      overflow: hidden;
    }
    .counter-bar-fill {
      height: 100%;
      width: 0;
      border-radius: 999px;
      background: #2563eb;
      transition: width 0.1s, background 0.15s;
    }
    .counter-bar-fill.warn  { background: #f59e0b; }
    .counter-bar-fill.limit { background: #ef4444; }

  </style>
</head>
<body>

<h1>Restricted Textarea</h1>

<div class="textarea-wrapper" data-restricted-textarea data-max="150">
  <label for="msg">Your message</label>
  <textarea id="msg" rows="5" placeholder="Start typing…"></textarea>
  <div class="counter-row">
    <div class="counter-bar-track" role="presentation">
      <div class="counter-bar-fill"></div>
    </div>
    <span class="counter" role="status" aria-live="polite" aria-atomic="true">0 / 150</span>
  </div>
</div>

<script src="index.js"></script>
</body>
</html>
